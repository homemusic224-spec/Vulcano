<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vulcano Invest</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#F5A623;--gold-dark:#D4891A;--green:#27AE60;--green-bright:#2ECC71;
    --bg:#0D0F14;--card:#161A23;--card2:#1C2130;--border:#252C3D;
    --text:#E8ECF0;--muted:#7A8499;--red:#E74C3C;--accent:#3498DB;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
  .screen{display:none;flex-direction:column;min-height:100vh;}
  .screen.active{display:flex;}
  .auth-bg{background:linear-gradient(145deg,#0a0c11 0%,#111520 40%,#0d1219 100%);position:relative;overflow:hidden;}
  .auth-bg::before{content:'';position:absolute;top:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(245,166,35,0.15) 0%,transparent 70%);border-radius:50%;}
  .auth-bg::after{content:'';position:absolute;bottom:100px;right:-60px;width:250px;height:250px;background:radial-gradient(circle,rgba(39,174,96,0.1) 0%,transparent 70%);border-radius:50%;}
  .auth-header{padding:60px 30px 30px;text-align:center;position:relative;z-index:1;}
  .logo-wrap{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:20px;margin-bottom:16px;box-shadow:0 8px 32px rgba(245,166,35,0.35);}
  .logo-wrap span{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:28px;color:#000;letter-spacing:1px;}
  .auth-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
  .auth-sub{font-size:14px;color:var(--muted);}
  .auth-form{flex:1;background:var(--card);border-radius:28px 28px 0 0;padding:32px 24px 40px;position:relative;z-index:1;}
  .form-title{font-size:20px;font-weight:700;margin-bottom:24px;color:var(--text);}
  .input-group{margin-bottom:18px;}
  .input-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;display:block;letter-spacing:0.5px;text-transform:uppercase;}
  .input-wrap{position:relative;}
  .input-wrap input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:14px 48px 14px 16px;font-size:16px;color:var(--text);font-family:'Nunito',sans-serif;transition:border-color 0.2s;outline:none;}
  .input-wrap input:focus{border-color:var(--gold);}
  .input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);}
  .btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:14px;font-size:16px;font-weight:700;color:#000;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.15s;box-shadow:0 6px 20px rgba(245,166,35,0.3);}
  .btn-primary:active{opacity:0.85;transform:scale(0.98);}
  .btn-secondary{width:100%;padding:14px;background:transparent;border:1.5px solid var(--border);border-radius:14px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;transition:border-color 0.2s;margin-top:12px;}
  .btn-secondary:active{opacity:0.7;}
  .auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--muted);}
  .auth-switch a{color:var(--gold);font-weight:700;cursor:pointer;text-decoration:none;}
  .forgot-link{text-align:right;font-size:13px;color:var(--gold);cursor:pointer;font-weight:600;margin-top:-8px;margin-bottom:18px;}
  /* APP HEADER */
  .app-header{background:var(--card);padding:16px 20px 0;border-bottom:1px solid var(--border);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .header-logo{display:flex;align-items:center;gap:10px;}
  .mini-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:#000;}
  .user-greeting{font-size:13px;color:var(--muted);}
  .user-name{font-size:15px;font-weight:700;color:var(--text);}
  .header-actions{display:flex;gap:10px;align-items:center;}
  .icon-btn{width:36px;height:36px;background:var(--card2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background 0.2s;}
  .icon-btn:active{background:var(--border);}
  .balance-card{background:linear-gradient(135deg,#1a2235,#141c2e);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin:0 0 16px;display:flex;align-items:center;justify-content:space-between;}
  .balance-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .balance-amount{font-size:24px;font-weight:800;color:var(--text);font-family:'Rajdhani',sans-serif;}
  .balance-currency{font-size:14px;color:var(--gold);font-weight:700;}
  .balance-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .stat-pill{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--green-bright);font-weight:600;}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--card);}
  .tab-btn{flex:1;padding:13px 8px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;position:relative;transition:color 0.2s;}
  .tab-btn.active{color:var(--text);}
  .tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--gold);border-radius:3px 3px 0 0;}
  .tab-btn.active.fin-tab::after{background:var(--accent);}
  /* CONTENT */
  .content-area{flex:1;padding:16px;overflow-y:auto;padding-bottom:90px;}
  .section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .qty-badge{background:var(--gold);color:#000;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;}
  /* PRODUCT CARDS */
  .product-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:12px;overflow:hidden;transition:transform 0.15s;animation:slideUp 0.4s ease both;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .product-card:nth-child(1){animation-delay:0.05s}.product-card:nth-child(2){animation-delay:0.10s}
  .product-card:nth-child(3){animation-delay:0.15s}.product-card:nth-child(4){animation-delay:0.20s}
  .product-card:nth-child(5){animation-delay:0.25s}
  .product-card:active{transform:scale(0.99);}
  .product-card.free-card{border-color:rgba(39,174,96,0.4);background:linear-gradient(135deg,var(--card),#112018);}
  .card-top{display:flex;align-items:center;padding:14px 14px 10px;gap:12px;position:relative;}
  .product-img{width:64px;height:64px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
  .free-product-img{background:linear-gradient(135deg,#0a3d20,#1a5e35);border:2px solid rgba(39,174,96,0.4);}
  .product-info{flex:1;}
  .product-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .price-row{display:flex;align-items:center;gap:8px;}
  .price-label{font-size:13px;color:var(--muted);font-weight:600;}
  .price-old{font-size:13px;color:var(--muted);text-decoration:line-through;font-family:'Rajdhani',sans-serif;font-weight:600;}
  .price-value{font-size:15px;font-weight:700;color:var(--gold);font-family:'Rajdhani',sans-serif;}
  .badge-free{background:linear-gradient(135deg,var(--green),var(--green-bright));color:#fff;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;}
  .qty-top{position:absolute;top:10px;right:14px;background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold);font-weight:700;}
  .card-stats{display:grid;grid-template-columns:1fr 1fr;padding:0 14px 4px;gap:4px;}
  .stat-item{display:flex;flex-direction:column;}
  .stat-key{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
  .stat-val{font-size:14px;font-weight:700;color:var(--text);font-family:'Rajdhani',sans-serif;}
  .card-bottom{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 14px;border-top:1px solid var(--border);margin-top:8px;}
  .total-info{font-size:13px;color:var(--muted);font-weight:600;}
  .total-val{color:var(--gold);font-weight:700;font-family:'Rajdhani',sans-serif;font-size:14px;}
  .btn-obter{background:linear-gradient(135deg,var(--green),var(--green-bright));color:#fff;border:none;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 15px rgba(39,174,96,0.35);}
  .btn-comprar{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 15px rgba(245,166,35,0.3);}
  .btn-comprar:active,.btn-obter:active{opacity:0.8;transform:scale(0.97);}
  .btn-processing{background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:12px;font-weight:700;cursor:default;font-family:'Nunito',sans-ser
